global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # ─────────────────────────────────────────────────────────────
  # Scrape the API service
  # ─────────────────────────────────────────────────────────────
  - job_name: 'api'
    static_configs:
      - targets: ['api:1078']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # ─────────────────────────────────────────────────────────────
  # Scrape Prometheus itself
  # ─────────────────────────────────────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
